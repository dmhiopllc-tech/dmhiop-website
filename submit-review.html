<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Experience | Desert Mountain Healing IOP</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Share your experience with Desert Mountain Healing IOP. Your feedback helps us improve our services and helps others find the support they need.">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', sans-serif;
            color: #333;
            line-height: 1.6;
            background: linear-gradient(135deg, #815956 0%, #62f5e7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            background: #fff;
            border-radius: 12px;
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        
        h1 {
            color: #815956;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        label .optional {
            font-weight: 400;
            color: #999;
            font-size: 0.9rem;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: 'Open Sans', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #62f5e7;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        /* Star Rating */
        .star-rating {
            text-align: center;
            margin: 2rem 0;
        }
        
        .star-rating label {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .stars {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            font-size: 3rem;
        }
        
        .star {
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s, transform 0.2s;
        }
        
        .star:hover,
        .star.active {
            color: #ffd700;
            transform: scale(1.1);
        }
        
        .star.hovered {
            color: #ffd700;
        }
        
        .rating-text {
            text-align: center;
            color: #815956;
            font-weight: 600;
            margin-top: 0.5rem;
            min-height: 24px;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #815956 0%, #62f5e7 100%);
            color: #fff;
            padding: 1rem 2rem;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(98, 245, 231, 0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .privacy-note {
            text-align: center;
            font-size: 0.85rem;
            color: #999;
            margin-top: 1.5rem;
            line-height: 1.5;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .stars {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/dmh-logo (1).png" alt="Desert Mountain Healing IOP Logo">
        </div>
        
        <h1>Share Your Experience</h1>
        <p class="subtitle">Your feedback helps us improve and helps others find the support they need</p>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="reviewForm" action="https://api.web3forms.com/submit" method="POST">
            <!-- Web3Forms Access Key - REPLACE WITH YOUR OWN -->
            <input type="hidden" name="access_key" value="74d38f74-e326-4c28-b365-4deaa24c0f67">
            
            <!-- Redirect URLs based on rating (we'll handle this with JavaScript) -->
            <input type="hidden" name="redirect" value="https://dmhiop.com/review-thank-you.html">
            
            <!-- Email subject -->
            <input type="hidden" name="subject" value="New Review Submission - Desert Mountain Healing IOP">
            
            <!-- Hidden field for rating -->
            <input type="hidden" id="rating" name="rating" required>
            
            <div class="form-group">
                <label for="clientName">Your Name</label>
                <input type="text" id="clientName" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email <span class="optional">(optional)</span></label>
                <input type="email" id="email" name="email">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone <span class="optional">(optional)</span></label>
                <input type="tel" id="phone" name="phone">
            </div>
            
            <div class="star-rating">
                <label>How would you rate your experience?</label>
                <div class="stars" id="starRating">
                    <span class="star" data-rating="1">★</span>
                    <span class="star" data-rating="2">★</span>
                    <span class="star" data-rating="3">★</span>
                    <span class="star" data-rating="4">★</span>
                    <span class="star" data-rating="5">★</span>
                </div>
                <div class="rating-text" id="ratingText"></div>
            </div>
            
            <div class="form-group">
                <label for="reviewText">Tell us about your experience</label>
                <textarea id="reviewText" name="message" required placeholder="Share your thoughts..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Submit Feedback</button>
            
            <p class="privacy-note">
                Your feedback is confidential and will be used to improve our services. 
                High ratings may be shared publicly with your permission.
            </p>
        </form>
    </div>

    <script>
        let selectedRating = 0;
        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('rating');
        const ratingText = document.getElementById('ratingText');
        const form = document.getElementById('reviewForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        
        const ratingLabels = {
            1: 'Poor',
            2: 'Fair',
            3: 'Good',
            4: 'Very Good',
            5: 'Excellent'
        };
        
        // Star rating hover effect
        stars.forEach(star => {
            star.addEventListener('mouseenter', function() {
                const rating = parseInt(this.dataset.rating);
                highlightStars(rating, true);
            });
            
            star.addEventListener('click', function() {
                selectedRating = parseInt(this.dataset.rating);
                ratingInput.value = selectedRating;
                highlightStars(selectedRating, false);
                ratingText.textContent = ratingLabels[selectedRating];
            });
        });
        
        // Reset stars on mouse leave
        document.getElementById('starRating').addEventListener('mouseleave', function() {
            highlightStars(selectedRating, false);
        });
        
        function highlightStars(rating, isHover) {
            stars.forEach(star => {
                const starRating = parseInt(star.dataset.rating);
                star.classList.remove('active', 'hovered');
                
                if (starRating <= rating) {
                    if (isHover) {
                        star.classList.add('hovered');
                    } else {
                        star.classList.add('active');
                    }
                }
            });
        }
        
        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Validate rating
            if (!selectedRating) {
                showError('Please select a star rating');
                return;
            }
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            errorMessage.style.display = 'none';
            
            try {
                // Submit form to Web3Forms
                const formData = new FormData(form);
                
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Redirect based on rating
                    if (selectedRating === 5) {
                        // 5-star review - redirect to thank you page with Google link
                        window.location.href = '/review-thank-you.html?rating=5';
                    } else {
                        // 1-4 star review - redirect to feedback thank you page
                        window.location.href = '/review-thank-you.html?rating=' + selectedRating;
                    }
                } else {
                    throw new Error('Form submission failed');
                }
                
            } catch (error) {
                console.error('Error submitting review:', error);
                showError('There was an error submitting your feedback. Please try again or contact us directly at (505) 270-0840.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Feedback';
            }
        });
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
